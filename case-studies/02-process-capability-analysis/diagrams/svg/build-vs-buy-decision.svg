<svg xmlns="http://www.w3.org/2000/svg" width="930" height="560" viewBox="0 0 930 560" role="img" aria-label="Build vs Buy Decision">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <text x="465.0" y="42" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Build vs Buy Decision</text>
  <text x="465.0" y="72" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6B7280">Choosing a focused internal tool over a costly enterprise software dependency</text>
  
  <g filter="url(#shadow)">
    <rect x="70" y="120" width="340" height="360" rx="18" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="240" y="155" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Buy</text>
    <text x="240" y="182" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#6B7280">Commercial statistical suite</text>
    
    <rect x="110" y="220" width="260" height="52" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="240.0" y="252.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Mature functionality</text>
    
    
    <rect x="110" y="290" width="260" height="52" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="240.0" y="322.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Professional UI</text>
    
    
    <rect x="110" y="360" width="260" height="52" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="240.0" y="392.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Broad analytical coverage</text>
    
    
    <rect x="110" y="430" width="260" height="52" rx="14" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
    <text x="240.0" y="462.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">High enterprise cost</text>
    
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="120" width="340" height="360" rx="18" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="690" y="155" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Build</text>
    <text x="690" y="182" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#6B7280">Focused internal tool</text>
    
    <rect x="560" y="220" width="260" height="52" rx="14" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="690.0" y="252.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Lower cost</text>
    
    
    <rect x="560" y="290" width="260" height="52" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="690.0" y="322.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Workflow-specific scope</text>
    
    
    <rect x="560" y="360" width="260" height="52" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="690.0" y="392.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Accessible to users</text>
    
    
    <rect x="560" y="430" width="260" height="52" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="690.0" y="462.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Controlled calculations</text>
    
  </g>

  <line x1="410" y1="300" x2="520" y2="300" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="286" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#374151">Decision</text>
  <text x="465" y="324" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#6B7280">Focused scope</text>

</svg>
