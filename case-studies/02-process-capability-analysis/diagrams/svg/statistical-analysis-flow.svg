<svg xmlns="http://www.w3.org/2000/svg" width="1110" height="570" viewBox="0 0 1110 570" role="img" aria-label="Statistical Analysis Flow">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <text x="555.0" y="42" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Statistical Analysis Flow</text>
  <text x="555.0" y="72" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6B7280">A focused workflow for repeatable process capability decisions</text>
  
  <g filter="url(#shadow)">
    
    <rect x="80" y="145" width="250" height="64" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="205.0" y="183.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Raw Process Data</text>
    
    
    <rect x="430" y="145" width="250" height="64" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="555.0" y="183.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Data Validation</text>
    
    
    <rect x="780" y="145" width="250" height="64" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="905.0" y="183.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Distribution Check</text>
    
    
    <rect x="780" y="285" width="250" height="64" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="905.0" y="323.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Capability Metrics</text>
    
    
    <rect x="430" y="285" width="250" height="64" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="555.0" y="323.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Visual Analysis</text>
    
    
    <rect x="80" y="285" width="250" height="64" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="205.0" y="323.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827">Scenario Simulation</text>
    
    
    <rect x="355" y="425" width="400" height="70" rx="14" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="555.0" y="466.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#111827">Process Decision Support</text>
    
  </g>

  <line x1="330" y1="177" x2="430" y2="177" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="680" y1="177" x2="780" y2="177" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="905" y1="209" x2="905" y2="285" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="780" y1="317" x2="680" y2="317" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="317" x2="330" y2="317" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="205" y1="349" x2="355" y2="460" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="555" y1="349" x2="555" y2="425" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="905" y1="349" x2="755" y2="460" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

</svg>
