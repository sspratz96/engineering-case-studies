<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="610" viewBox="0 0 1020 610" role="img" aria-label="AWS Pricing Integration">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <text x="510.0" y="42" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">AWS Pricing Integration</text>
  <text x="510.0" y="72" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6B7280">Pricing and Savings Plans reference data for richer FinOps analysis</text>
  
  <g filter="url(#shadow)">
    
    <rect x="70" y="135" width="245" height="75" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="192.5" y="167.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Assume Role</text><text x="192.5" y="189.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Cross-account AWS access</text>
    
    
    <rect x="385" y="135" width="245" height="75" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="507.5" y="167.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Token Refresh</text><text x="507.5" y="189.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Long-running extraction support</text>
    
    
    <rect x="700" y="135" width="245" height="75" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="822.5" y="167.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">AWS Pricing API</text><text x="822.5" y="189.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Products and regional prices</text>
    
    
    <rect x="700" y="295" width="245" height="75" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="822.5" y="327.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Savings Plans API</text><text x="822.5" y="349.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Offering rates</text>
    
    
    <rect x="385" y="295" width="245" height="75" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="507.5" y="327.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Pagination</text><text x="507.5" y="349.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Complete price extraction</text>
    
    
    <rect x="70" y="295" width="245" height="75" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="192.5" y="327.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Normalize Data</text><text x="192.5" y="349.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Structured pricing tables</text>
    
    
    <rect x="385" y="455" width="245" height="75" rx="14" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="507.5" y="487.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">PostgreSQL / RDS</text><text x="507.5" y="509.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Pricing reference layer</text>
    
