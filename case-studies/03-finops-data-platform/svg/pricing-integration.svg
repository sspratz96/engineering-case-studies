  <line x1="385" y1="332" x2="315" y2="332" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="192" y1="370" x2="385" y2="490" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

