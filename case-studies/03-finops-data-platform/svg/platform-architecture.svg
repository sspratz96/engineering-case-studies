<svg xmlns="http://www.w3.org/2000/svg" width="940" height="740" viewBox="0 0 940 740" role="img" aria-label="FinOps Platform Architecture">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <text x="470.0" y="42" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">FinOps Platform Architecture</text>
  <text x="470.0" y="72" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6B7280">Multi-cloud cost and pricing data consolidated through Mage, ECS and PostgreSQL/RDS</text>
  
  <g filter="url(#shadow)">
    
    <rect x="70" y="125" width="220" height="70" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="180.0" y="155.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">AWS CUR</text><text x="180.0" y="177.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Athena extraction</text>
    
    
    <rect x="360" y="125" width="220" height="70" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="470.0" y="155.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">OCI Billing</text><text x="470.0" y="177.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Provider cost data</text>
    
    
    <rect x="650" y="125" width="220" height="70" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="760.0" y="155.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">AWS Pricing API</text><text x="760.0" y="177.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Pricing reference data</text>
    
    
    <rect x="310" y="285" width="320" height="80" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
    <text x="470.0" y="320.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Mage Pipelines</text><text x="470.0" y="342.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Running on AWS ECS</text>
    
    
    <rect x="310" y="445" width="320" height="80" rx="14" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="470.0" y="480.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">PostgreSQL / RDS</text><text x="470.0" y="502.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Centralized FinOps database</text>
    
    
    <rect x="80" y="600" width="220" height="72" rx="14" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="190.0" y="631.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Customer Portal</text><text x="190.0" y="653.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Product-facing datasets</text>
    
    
    <rect x="360" y="600" width="220" height="72" rx="14" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="470.0" y="631.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Dashboards</text><text x="470.0" y="653.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Analytical consumption</text>
    
    
    <rect x="640" y="600" width="220" height="72" rx="14" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5"/>
    <text x="750.0" y="631.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">AI Agent / MCP</text><text x="750.0" y="653.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Curated data access</text>
    
  </g>
  <line x1="180" y1="195" x2="390" y2="285" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="195" x2="470" y2="285" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="195" x2="550" y2="285" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="365" x2="470" y2="445" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="525" x2="190" y2="600" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="525" x2="470" y2="600" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="525" x2="750" y2="600" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

</svg>
