    <text x="575.0" y="437.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Topological Sort</text><text x="575.0" y="459.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">Correct refresh order</text>
    
    
    <rect x="770" y="405" width="250" height="75" rx="14" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5"/>
