    <text x="255.0" y="437.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Dependency Detection</text><text x="255.0" y="459.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280">PostgreSQL object graph</text>
    
    
